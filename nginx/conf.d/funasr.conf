# ============================================================
# FunASR 服务路由配置
#
# 路由规则:
#   /v1/*        → funasr-api (HTTP 文件转写，负载均衡)
#   /health      → funasr-api
#   /docs        → funasr-api (Swagger UI)
#   /ws          → funasr-ws  (WebSocket 实时流)
# ============================================================

# ── OpenAI API 上游（支持多实例负载均衡）──────────────────────
# docker compose up -d --scale funasr-api=3 后，Nginx 自动发现新实例
# 注意: Docker Compose 服务名 "funasr-api" 会被自动解析为所有实例 IP
upstream funasr_api_upstream {
    # least_conn: 将请求路由到当前连接数最少的实例
    # 对于 GPU 推理（每个请求耗时不一）比 round-robin 更均衡
    least_conn;

    server funasr-api:8000 fail_timeout=10s max_fails=3;
    # 扩展实例后无需手动修改这里，Docker DNS 会处理

    # 健康检查（nginx 商业版支持 health_check 指令）
    keepalive 32;
}

# ── WebSocket Runtime 上游 ────────────────────────────────────
# WebSocket 是长连接，必须用 ip_hash 保证同一客户端打到同一实例
upstream funasr_ws_upstream {
    ip_hash;  # sticky session，WebSocket 扩展必须
    server funasr-ws:10095 fail_timeout=30s max_fails=2;
    keepalive 16;
}

server {
    listen 80;
    server_name _;   # 匹配所有 Host，内网使用 IP 直接访问

    # ── OpenAI 兼容 HTTP API ──────────────────────────────────
    location /v1/ {
        proxy_pass http://funasr_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 传递/生成 Request ID，方便跨服务日志关联
        proxy_set_header X-Request-ID $request_id;
        # Nginx 统一注入鉴权 header，内网用户无需关心 API key
        proxy_set_header Authorization "Bearer funasr-internal";

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # 大文件转发不缓冲（直接流式传给后端）
        proxy_request_buffering off;
    }

    # ── 健康检查（仅内网可访问）─────────────────────────────────
    location = /health {
        proxy_pass http://funasr_api_upstream/health;
        proxy_set_header Host $host;
        # 外网开放时取消下面注释，限制只有内网可访问
        # allow 10.0.0.0/8;
        # allow 192.168.0.0/16;
        # allow 172.16.0.0/12;
        # deny all;
    }

    # ── Swagger 文档 ──────────────────────────────────────────
    location /docs {
        proxy_pass http://funasr_api_upstream/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://funasr_api_upstream/openapi.json;
        proxy_set_header Host $host;
    }

    # ── WebSocket 实时流 ──────────────────────────────────────
    location /ws {
        proxy_pass http://funasr_ws_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # WebSocket 长连接，超时设长
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
    }

    # ── 根路径：简单状态页 ────────────────────────────────────
    location = / {
        return 200 '{"service":"FunASR","status":"running","endpoints":{"/v1/audio/transcriptions":"HTTP file transcription","/ws":"WebSocket streaming","/health":"health check","/docs":"API docs"}}';
        add_header Content-Type application/json;
    }

    # ── 屏蔽无用路径 ─────────────────────────────────────────
    location = /favicon.ico { return 204; }
    location = /robots.txt  { return 200 "User-agent: *\nDisallow: /\n"; }
}

